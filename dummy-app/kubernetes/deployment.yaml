apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-typescript-app
  labels:
    app: node-typescript-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-typescript-app
  template:
    metadata:
      labels:
        app: node-typescript-app
    spec:
      containers:
        - name: app
          image: triage-agent-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: node-typescript-app-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
